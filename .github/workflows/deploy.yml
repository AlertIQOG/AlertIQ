name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/cs113/AlertIQ
          git pull origin main

      - name: Rebuild and restart containers
        run: |
          cd /home/cs113/AlertIQ
          docker compose -f docker-compose.prod.yml up --build -d
