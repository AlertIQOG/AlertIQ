global:
  resolve_timeout: 5m

route:
  receiver: "alertiq-backend"
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1m

receivers:
  - name: "alertiq-backend"
    webhook_configs:
      - url: "http://backend:8000/api/v1/ingest/prometheus/81f579fe-0a3e-4560-a855-d0e62a0df7e7"
        send_resolved: true
