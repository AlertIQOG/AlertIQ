# ─── AlertIQ Dev Stack ─────────────────────────────────────────────
# Spins up backend + PostgreSQL + Grafana + Prometheus + Alertmanager.
#
# Usage:
#   docker compose up -d
#
# Grafana UI:  http://localhost:3001  (admin / admin)
# PostgreSQL:  localhost:5432  (alertiq / alertiq / alertiq)
# Prometheus:  http://localhost:9090
# Alertmanager: http://localhost:9093

services:
  # ── Backend API ───────────────────────────────────────────────────
  backend:
    image: python:3.12-slim
    container_name: alertiq-backend
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alertiq-postgres
    environment:
      POSTGRES_USER: alertiq
      POSTGRES_PASSWORD: alertiq
      POSTGRES_DB: alertiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alertiq"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: alertiq-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Allow Grafana to send webhooks to the host machine
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres:
        condition: service_healthy

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: alertiq-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      alertmanager:
        condition: service_started

  # ── Alertmanager ────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertiq-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

volumes:
  pgdata:
  grafana_data:
